<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light only">
    <title>Dino Runner Advance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <div id="ui-layer">
            <div id="score-display">00000 | HI 00000</div>
            
            <div id="screen-start" class="screen active">
                <h1>DINO RUNNER</h1>
                <p class="desktop-hint">Press SPACE to Jump, DOWN to Duck</p>
                <p class="mobile-hint">Tap to Jump, Swipe Down to Duck</p>
                <button id="btn-start">Play</button>
            </div>
            
            <div id="screen-game-over" class="screen">
                <h2>GAME OVER</h2>
                <p id="final-score">Score: 0</p>
                <button id="btn-restart">Restart</button>
            </div>

            <div id="screen-pause" class="screen">
                <h2>PAUSED</h2>
                <button id="btn-resume">Resume</button>
            </div>
            
            <button id="btn-pause" class="icon-btn">⏸</button>
            <button id="btn-sound" class="icon-btn">🔊</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
